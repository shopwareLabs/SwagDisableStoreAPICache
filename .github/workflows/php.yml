name: PHP
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v7

      - name: Verify extension
        uses: shopware/github-actions/extension-verifier@main
        with:
          action: check

  phpunit:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Setup extension
        uses: shopware/github-actions/setup-extension@main
        with:
          extensionName: SwagDisableStoreApiCache
          shopwareVersion: 6.6.x
          install: false
          # Keep the local path repository so Composer symlinks the checked-out
          # working tree instead of downloading a tagged archive from the repo.
          extraRepositories: |
            {
              "swag-disable-store-api-cache": {
                "type": "path",
                "url": "custom/plugins/SwagDisableStoreApiCache",
                "options": { "symlink": true }
              }
            }

      - name: Run PHPUnit
        uses: shopware/github-actions/phpunit@main
        with:
          extensionName: SwagDisableStoreApiCache
