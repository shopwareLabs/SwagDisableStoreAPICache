name: PHP
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify extension
        uses: shopware/github-actions/extension-verifier@main
        with:
          action: check

  phpunit:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Setup extension
        uses: shopware/github-actions/setup-extension@main
        with:
          extensionName: SwagDisableStoreApiCache
          shopwareVersion: 6.6.x
          install: true

      - uses: shopware/github-actions/phpunit@main
        with:
          extensionName: SwagDisableStoreApiCache
